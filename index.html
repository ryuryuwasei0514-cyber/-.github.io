<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人生 攻略Wiki</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: #f6f6f6;
    transition: 0.3s;
}

.dark {
    background: #1e1e1e;
    color: white;
}

header {
    background: #2a4b8d;
    color: white;
    padding: 15px;
}

.container {
    display: flex;
    flex-wrap: wrap;
}

.sidebar {
    width: 220px;
    background: #e9eef6;
    padding: 10px;
}

.sidebar button {
    width: 100%;
    margin-bottom: 5px;
    padding: 10px;
    border: none;
    background: #2a4b8d;
    color: white;
}

.content {
    flex: 1;
    padding: 20px;
    background: white;
}

.page { display: none; }
.active { display: block; }

.bar {
    height: 20px;
    background: green;
    margin-bottom: 5px;
}

.comment {
    background: #ddd;
    margin-top: 5px;
    padding: 5px;
}

@media(max-width: 800px){
    .sidebar { width: 100%; }
}
</style>

</head>

<body>

<header>
人生（チュートリアル編）攻略Wiki
<button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

<div class="sidebar">
<input type="text" id="search" placeholder="検索..." onkeyup="search()">
<button onclick="showPage('top')">トップ</button>
<button onclick="showPage('comments')">コメント</button>
</div>

<div class="content">

<div id="top" class="page active">
<h2>ステータス</h2>

やる気
<div class="bar" id="motivationBar" style="width:50%"></div>

<button onclick="recover()">回復</button>
</div>

<div id="comments" class="page">
<h2>コメント</h2>

<textarea id="input"></textarea><br>
<button onclick="addComment()">投稿</button>

<div id="list"></div>
</div>

</div>
</div>

<script>
// ページ切替
function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ダークモード
function toggleDark(){
    document.body.classList.toggle("dark");
}

// やる気ゲージ
let motivation = 50;

setInterval(()=>{
    motivation = Math.max(0, motivation - 1);
    updateBar();
},3000);

function recover(){
    motivation = Math.min(100, motivation + 20);
    updateBar();
}

function updateBar(){
    document.getElementById("motivationBar").style.width = motivation + "%";
}

// コメント保存
function addComment(){
    let text = document.getElementById("input").value;
    if(!text) return;

    let comments = JSON.parse(localStorage.getItem("comments") || "[]");
    comments.unshift(text);
    localStorage.setItem("comments", JSON.stringify(comments));

    document.getElementById("input").value = "";
    loadComments();
}

function loadComments(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    let comments = JSON.parse(localStorage.getItem("comments") || "[]");
    comments.forEach(c=>{
        let div = document.createElement("div");
        div.className = "comment";
        div.textContent = c;
        list.appendChild(div);
    });
}

loadComments();

// 検索（簡易）
function search(){
    let q = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".content").forEach(c=>{
        c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
    });
}
</script>

</body>
</html>
